<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏆 Dashboard Closers — Konclui</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e1a;--surface:#111827;--s2:#1f2937;--s3:#27364d;--gold:#f59e0b;--silver:#94a3b8;--bronze:#cd7c2f;--elite-c:#818cf8;--fur-c:#34d399;--text:#f1f5f9;--muted:#64748b;--accent:#3b82f6;--danger:#ef4444;--success:#10b981;--warn:#f59e0b}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at center,#1a1f35 0%,#0a0e1a 70%)}
.login-card{background:var(--surface);border:1px solid #2d3748;border-radius:20px;padding:48px 40px;width:420px;text-align:center;box-shadow:0 25px 50px rgba(0,0,0,.5)}
.login-logo{font-size:56px;margin-bottom:12px}
.login-title{font-size:26px;font-weight:800;margin-bottom:6px;background:linear-gradient(135deg,#f59e0b,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.login-subtitle{color:var(--muted);font-size:13px;margin-bottom:32px}
.login-form{display:flex;flex-direction:column;gap:14px}
.login-form input{background:var(--s2);border:1px solid #374151;border-radius:10px;padding:14px 16px;color:var(--text);font-size:15px;outline:none;transition:border-color .2s;pointer-events:auto}
.login-form input:focus{border-color:var(--accent)}
.login-form input::placeholder{color:var(--muted)}
.btn-login{background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;border-radius:10px;padding:14px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:transform .1s,box-shadow .2s}
.btn-login:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(59,130,246,.4)}
.error-msg{color:var(--danger);font-size:13px;margin-top:4px;display:none}
.dashboard{display:none;min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid #1a2235;padding:14px 28px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-brand{display:flex;align-items:center;gap:12px}
.header-logo{font-size:26px}
.header-title{font-size:18px;font-weight:800}
.header-sub{font-size:11px;color:var(--muted);margin-top:1px}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.user-chip{background:var(--s2);border-radius:10px;padding:8px 14px}
.user-role{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.user-name{font-size:13px;font-weight:700}
.btn-out{background:transparent;border:1px solid #374151;border-radius:8px;padding:7px 14px;color:var(--muted);cursor:pointer;font-size:12px;transition:all .2s}
.btn-out:hover{border-color:var(--danger);color:var(--danger)}
.btn-toggle{background:var(--s2);border:1px solid #374151;border-radius:8px;padding:7px 14px;color:var(--text);cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;display:none}
.btn-toggle.active{border-color:var(--success);color:var(--success)}
.btn-toggle.locked{border-color:var(--warn);color:var(--warn)}
.content{padding:24px 28px;max-width:1400px;margin:0 auto}
.tabs{display:flex;gap:6px;margin-bottom:22px;background:var(--surface);border-radius:12px;padding:5px;width:fit-content}
.tab{padding:9px 22px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;color:var(--muted);transition:all .2s;border:none;background:transparent}
.tab.active{background:var(--accent);color:#fff;box-shadow:0 4px 12px rgba(59,130,246,.3)}
.section{display:none}
.section.active{display:block}
.filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.filter-label{font-size:11px;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.fgroup{display:flex;gap:6px;flex-wrap:wrap}
.fbtn{padding:7px 16px;border-radius:8px;border:1px solid #374151;background:var(--s2);color:var(--text);cursor:pointer;font-size:12px;font-weight:600;transition:all .2s}
.fbtn.active{border-color:var(--accent);background:rgba(59,130,246,.15);color:var(--accent)}
.sfilter{background:var(--s2);border:1px solid #374151;border-radius:8px;padding:7px 12px;color:var(--text);font-size:12px;outline:none;cursor:pointer}
.rank-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:12px}
.rank-title{font-size:20px;font-weight:800}
.rank-sub{font-size:12px;color:var(--muted);margin-top:3px}
.podium{display:flex;justify-content:center;align-items:flex-end;gap:14px;margin-bottom:32px;padding:16px 0}
.pod-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;transition:transform .2s}
.pod-wrap:hover{transform:translateY(-5px)}
.pod-avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;border:3px solid transparent}
.pod-avatar.p1{width:76px;height:76px;border-color:var(--gold);background:linear-gradient(135deg,#78350f,#d97706);font-size:24px;box-shadow:0 0 28px rgba(245,158,11,.35)}
.pod-avatar.p2{width:60px;height:60px;border-color:var(--silver);background:linear-gradient(135deg,#334155,#64748b);font-size:18px}
.pod-avatar.p3{width:60px;height:60px;border-color:var(--bronze);background:linear-gradient(135deg,#451a03,#92400e);font-size:18px}
.pod-crown{font-size:22px;line-height:1}
.pod-base{border-radius:10px 10px 0 0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.pod-base.p1{width:136px;height:110px;background:linear-gradient(180deg,rgba(245,158,11,.18),rgba(245,158,11,.04));border:1px solid rgba(245,158,11,.35);border-bottom:none}
.pod-base.p2{width:116px;height:84px;background:linear-gradient(180deg,rgba(148,163,184,.12),rgba(148,163,184,.02));border:1px solid rgba(148,163,184,.25);border-bottom:none}
.pod-base.p3{width:116px;height:66px;background:linear-gradient(180deg,rgba(205,124,47,.12),rgba(205,124,47,.02));border:1px solid rgba(205,124,47,.25);border-bottom:none}
.pod-pos{font-size:26px;font-weight:900;line-height:1}
.pod-name{font-size:12px;font-weight:700;text-align:center;padding:0 6px}
.pod-score{font-size:18px;font-weight:800}
.squad-badge{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:700;border:1px solid}
.badge-elite{background:rgba(99,102,241,.15);color:var(--elite-c);border-color:rgba(99,102,241,.3)}
.badge-fur{background:rgba(16,185,129,.15);color:var(--fur-c);border-color:rgba(16,185,129,.3)}
.rank-list{display:flex;flex-direction:column;gap:7px}
.rank-item{background:var(--surface);border:1px solid #1a2235;border-radius:13px;padding:13px 16px;display:flex;align-items:center;gap:12px;transition:all .2s;cursor:pointer;position:relative}
.rank-item:hover{border-color:#374151;transform:translateX(4px);box-shadow:0 4px 18px rgba(0,0,0,.4)}
.rank-item.alert-cc{border-color:rgba(239,68,68,.3)}
.r-pos{font-size:17px;font-weight:800;width:32px;text-align:center;color:var(--muted);flex-shrink:0}
.r-pos.t1{color:var(--gold)}.r-pos.t2{color:var(--silver)}.r-pos.t3{color:var(--bronze)}
.r-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;position:relative}
.cc-alert{position:absolute;top:-3px;right:-3px;width:14px;height:14px;background:var(--danger);border-radius:50%;border:2px solid var(--bg);display:flex;align-items:center;justify-content:center;font-size:8px}
.r-info{min-width:110px}
.r-name{font-size:14px;font-weight:700}
.r-squad{font-size:10px;margin-top:1px}
.r-squad.elite{color:var(--elite-c)}.r-squad.fur{color:var(--fur-c)}
.r-score-wrap{display:flex;flex-direction:column;gap:3px;min-width:130px}
.r-score-label{font-size:10px;color:var(--muted)}
.r-score-bar-track{background:#1a2235;border-radius:4px;height:8px;overflow:hidden}
.r-score-bar-fill{height:100%;border-radius:4px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.r-bar-wrap{flex:1;min-width:90px}
.r-bar-lbl{font-size:10px;color:var(--muted);display:flex;justify-content:space-between;margin-bottom:3px}
.r-bar-track{background:#1a2235;border-radius:4px;height:6px;overflow:hidden}
.r-bar-fill{height:100%;border-radius:4px;transition:width 1s cubic-bezier(.4,0,.2,1)}
.r-metrics{display:flex;gap:14px;flex-shrink:0}
.r-metric{text-align:right}
.r-mv{font-size:13px;font-weight:700}
.r-ml{font-size:9px;color:var(--muted)}
.meta-badge{font-size:10px;padding:2px 7px;border-radius:6px;font-weight:700}
.meta-ok{background:rgba(16,185,129,.15);color:var(--success);border:1px solid rgba(16,185,129,.3)}
.meta-nok{background:rgba(239,68,68,.15);color:var(--danger);border:1px solid rgba(239,68,68,.3)}
.ineligible-badge{font-size:9px;padding:1px 6px;border-radius:4px;background:rgba(100,116,139,.15);color:var(--muted);border:1px solid rgba(100,116,139,.2);margin-left:4px}
.locked-section{background:linear-gradient(135deg,rgba(245,158,11,.08),rgba(245,158,11,.02));border:1px dashed rgba(245,158,11,.3);border-radius:16px;padding:40px;text-align:center}
.locked-icon{font-size:48px;margin-bottom:12px}
.locked-title{font-size:18px;font-weight:700;color:var(--warn)}
.locked-sub{font-size:13px;color:var(--muted);margin-top:6px}
.charts-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:24px}
.chart-card{background:var(--surface);border:1px solid #1a2235;border-radius:14px;padding:20px}
.chart-full{grid-column:1/-1}
.chart-title{font-size:13px;font-weight:700;margin-bottom:16px}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid #1a2235;border-radius:11px;padding:16px}
.stat-card.hl{border-color:rgba(245,158,11,.35);background:rgba(245,158,11,.04)}
.stat-val{font-size:22px;font-weight:800}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px}
.score-breakdown{display:flex;flex-direction:column;gap:8px;margin-top:16px}
.score-row{display:flex;align-items:center;gap:10px}
.score-row-label{font-size:12px;color:var(--muted);width:160px;flex-shrink:0}
.score-row-bar{flex:1;background:#1a2235;border-radius:4px;height:8px;overflow:hidden}
.score-row-fill{height:100%;border-radius:4px;transition:width .8s}
.score-row-val{font-size:12px;font-weight:700;width:40px;text-align:right;flex-shrink:0}
.squad-section{margin-bottom:28px}
.squad-title{font-size:17px;font-weight:800;margin-bottom:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.divider{height:1px;background:#1a2235;margin:20px 0}
.meta-progress-track{background:#1a2235;border-radius:6px;height:10px;overflow:hidden}
.meta-progress-fill{height:100%;border-radius:6px;transition:width .8s}
.premio-banner{background:linear-gradient(135deg,rgba(245,158,11,.15),rgba(245,158,11,.03));border:1px solid rgba(245,158,11,.3);border-radius:14px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:14px}
.premio-icon{font-size:32px}
.premio-title{font-size:14px;font-weight:800;color:var(--gold)}
.premio-sub{font-size:12px;color:var(--muted);margin-top:2px}
.no-data{text-align:center;padding:50px;color:var(--muted);font-size:14px}
.evol-tabs{display:flex;gap:6px;margin-bottom:20px;background:var(--s2);border-radius:10px;padding:4px;width:fit-content}
.evol-tab{padding:7px 18px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);transition:all .2s;border:none;background:transparent}
.evol-tab.active{background:var(--surface);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.3)}
@media(max-width:768px){.content{padding:14px}.charts-grid{grid-template-columns:1fr}.r-metrics{display:none}.r-bar-wrap{display:none}.r-score-wrap{display:none}.podium{gap:6px}}
</style>
</head>
<body>
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <div class="login-logo">🏆</div>
    <div class="login-title">Dashboard Closers</div>
    <div class="login-subtitle">Konclui — Entre com seu código de acesso</div>
    <div class="login-form">
      <input type="text" id="loginUser" placeholder="Código de acesso" autocomplete="off"/>
      <input type="password" id="loginPass" placeholder="Senha" autocomplete="off"/>
      <button class="btn-login" onclick="doLogin()">Entrar</button>
      <div class="error-msg" id="errMsg">Código ou senha incorretos</div>
    </div>
  </div>
</div>
<div class="dashboard" id="dashboard">
  <div class="header">
    <div class="header-brand">
      <span class="header-logo">🏆</span>
      <div><div class="header-title">Dashboard Closers</div><div class="header-sub">Konclui</div></div>
    </div>
    <div class="header-right">
      <button class="btn-toggle" id="btnToggleTrimestre" onclick="toggleTrimestreRanking()">🔒 Ranking Trim. Bloqueado</button>
      <div class="user-chip">
        <div class="user-role" id="userRoleLabel">-</div>
        <div class="user-name" id="userNameLabel">-</div>
      </div>
      <button class="btn-out" onclick="doLogout()">Sair</button>
    </div>
  </div>
  <div class="content">
    <div class="tabs">
      <button class="tab active" onclick="showTab('ranking',this)">🏅 Ranking</button>
      <button class="tab" onclick="showTab('evolucao',this)" id="tabEvolucao">📈 Evolução</button>
      <button class="tab" onclick="showTab('squad',this)" id="tabSquad">👥 Squad</button>
      <button class="tab" onclick="showTab('premios',this)">🥇 Premiações</button>
    </div>
    <div class="section active" id="sec-ranking">
      <div class="filters">
        <span class="filter-label">Período:</span>
        <div class="fgroup" id="periodFilter">
          <button class="fbtn active" onclick="setPeriod('semana',this)">Semana</button>
          <button class="fbtn" onclick="setPeriod('mes',this)">Mês</button>
          <button class="fbtn" onclick="setPeriod('trimestre',this)">Trimestre</button>
        </div>
        <div id="semanaFilterWrap" style="display:flex;align-items:center;gap:8px;margin-left:8px">
          <span class="filter-label">Semana:</span>
          <select class="sfilter" id="semanaFilter" onchange="renderRanking()"></select>
        </div>
        <div id="mesFilterWrap" style="display:none;align-items:center;gap:8px;margin-left:8px">
          <span class="filter-label">Mês:</span>
          <select class="sfilter" id="mesFilter" onchange="renderRanking()"></select>
        </div>
        <div id="trimestreFilterWrap" style="display:none;align-items:center;gap:8px;margin-left:8px">
          <span class="filter-label">Trimestre:</span>
          <select class="sfilter" id="trimestreFilter" onchange="renderRanking()"></select>
        </div>
      </div>
      <div class="rank-header">
        <div>
          <div class="rank-title" id="rankingTitle">🏆 Ranking &mdash; Score de Performance</div>
          <div class="rank-sub" id="rankingSub"></div>
        </div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:center">
          <div style="display:flex;align-items:center;gap:6px">
            <span class="filter-label">Ordenar por:</span>
            <select class="sfilter" id="sortMetric" onchange="renderRanking()">
              <option value="score">⭐ Score Geral</option>
              <option value="vendas">Vendas</option>
              <option value="rbv">RBV (R$)</option>
              <option value="conversao">Conversão %</option>
              <option value="caixa">Caixa (R$)</option>
              <option value="caixaDiaUtil">Caixa / Dia Útil</option>
              <option value="cashcollect">Cash Collect %</option>
              <option value="agendasDia">Agendas/Dia</option>
              <option value="metaPct">% Meta Atingida</option>
            </select>
          </div>
          <div style="display:flex;align-items:center;gap:6px">
            <span class="filter-label">Top:</span>
            <select class="sfilter" id="topCount" onchange="renderRanking()">
              <option value="3">Top 3</option>
              <option value="5" selected>Top 5</option>
              <option value="8">Top 8</option>
              <option value="10">Top 10</option>
              <option value="99">Todos</option>
            </select>
          </div>
        </div>
      </div>
      <div id="rankingContainer"></div>
    </div>
    <div class="section" id="sec-evolucao">
      <div class="evol-tabs">
        <button class="evol-tab active" id="etabCloser" onclick="setEvolTab('closer',this)">👤 Por Closer</button>
        <button class="evol-tab" id="etabSquad" onclick="setEvolTab('squad',this)">👥 Por Squad</button>
      </div>
      <div id="evolCloserSection">
        <div class="filters">
          <span class="filter-label">Closer:</span>
          <select class="sfilter" id="closerSelect" onchange="renderEvolucao()" style="font-size:13px;padding:8px 12px"></select>
          <span class="filter-label" style="margin-left:8px">Dados:</span>
          <div class="fgroup" id="granuFilter">
            <button class="fbtn active" onclick="setGranu('semana',this)">Semanal</button>
            <button class="fbtn" onclick="setGranu('mes',this)">Mensal</button>
          </div>
        </div>
        <div class="stats-row" id="evolStats"></div>
        <div id="scoreBreakdownWrap"></div>
        <div class="charts-grid" id="evolCharts"></div>
      </div>
      <div id="evolSquadSection" style="display:none">
        <div class="filters">
          <span class="filter-label">Granularidade:</span>
          <div class="fgroup" id="evolSquadGranuFilter">
            <button class="fbtn active" onclick="setEvolSquadGranu('semana',this)">Semanal</button>
            <button class="fbtn" onclick="setEvolSquadGranu('mes',this)">Mensal</button>
          </div>
        </div>
        <div class="charts-grid" id="evolSquadCharts"></div>
      </div>
    </div>
    <div class="section" id="sec-squad">
      <div class="filters">
        <span class="filter-label">Período:</span>
        <div class="fgroup" id="squadPeriodFilter">
          <button class="fbtn active" onclick="setSquadPeriod('semana',this)">Semana</button>
          <button class="fbtn" onclick="setSquadPeriod('mes',this)">Mês</button>
          <button class="fbtn" onclick="setSquadPeriod('trimestre',this)">Trimestre</button>
        </div>
        <div id="squadSemanaWrap" style="display:flex;align-items:center;gap:8px;margin-left:8px">
          <span class="filter-label">Semana:</span>
          <select class="sfilter" id="squadSemanaFilter" onchange="renderSquad()"></select>
        </div>
        <div id="squadMesWrap" style="display:none;align-items:center;gap:8px;margin-left:8px">
          <span class="filter-label">Mês:</span>
          <select class="sfilter" id="squadMesFilter" onchange="renderSquad()"></select>
        </div>
        <div id="squadTriWrap" style="display:none;align-items:center;gap:8px;margin-left:8px">
          <span class="filter-label">Trimestre:</span>
          <select class="sfilter" id="squadTriFilter" onchange="renderSquad()"></select>
        </div>
      </div>
      <div id="squadContainer"></div>
    </div>
    <div class="section" id="sec-premios">
      <div id="premiosContainer"></div>
    </div>
  </div>
</div>

function doLogin(){
  var u=document.getElementById('loginUser').value.trim().toLowerCase();
  var p=document.getElementById('loginPass').value.trim();
  var user=USERS[u];
  var err=document.getElementById('errMsg');
  if(!user||user.pass!==p){err.style.display='block';return;}
  err.style.display='none';
  currentUser=Object.assign({},user,{code:u});
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('dashboard').style.display='block';
  document.getElementById('userNameLabel').textContent=user.name;
  document.getElementById('userRoleLabel').textContent=user.role==='head'?'HEAD COMERCIAL':user.role==='supervisor'?'SUPERVISOR':'CLOSER';
  document.getElementById('tabSquad').style.display=user.role==='closer'?'none':'';
  var btn=document.getElementById('btnToggleTrimestre');
  if(user.role==='head'){btn.style.display='flex';updateTrimestreBtn();}
  initFilters();
  renderRanking();
}
document.addEventListener('keydown',function(e){if(e.key==='Enter'&&document.getElementById('loginScreen').style.display!=='none')doLogin();});

function getMetaPct(d){
  var mes=d.mes||'';
  var meta=METAS[mes]&&METAS[mes].closers[d.closer]||0;
  if(meta<=0)return 0;
  return(d.rbv/meta)*100;
}

  var bestAg=Math.max.apply(null,allData.map(function(x){return x.agendasDia||0;}))||1;
  var bestCDU=Math.max.apply(null,allData.map(function(x){return x.caixaDiaUtil||0;}))||1;
  var bestConv=Math.max.apply(null,allData.map(function(x){return x.conversao||0;}))||1;
  var bestCC=Math.max.apply(null,allData.map(function(x){return x.cashCollect||0;}))||1;
  var bestMeta=Math.max.apply(null,allData.map(function(x){return Math.min(getMetaPct(x),150);}))||1;
  var sAg=((d.agendasDia||0)/bestAg)*100;
  var sCDU=((d.caixaDiaUtil||0)/bestCDU)*100;
  var sConv=((d.conversao||0)/bestConv)*100;
  var sCC=Math.min((d.cashCollect||0)/bestCC*100,100);
  var sMeta=(pctMeta/bestMeta)*100;
  var score=sAg*0.25+sMeta*0.25+sCDU*0.20+sConv*0.20+sCC*0.10;
  return{score:Math.round(score),sAgendas:Math.round(sAg),sMeta:Math.round(sMeta),sCDU:Math.round(sCDU),sConv:Math.round(sConv),sCC:Math.round(sCC),pctMeta:Math.round(pctMeta*10)/10};
}
function getMV(d,m,scores){
  if(m==='score')return scores[d.closer]&&scores[d.closer].score||0;
  if(m==='metaPct')return scores[d.closer]&&scores[d.closer].pctMeta||0;
  var map={vendas:'vendas',rbv:'rbv',conversao:'conversao',caixa:'caixa',caixaDiaUtil:'caixaDiaUtil',cashcollect:'cashCollect',agendasDia:'agendasDia'};
  return d[map[m]]||0;
}
function fmtMV(m,v){
  if(m==='rbv'||m==='caixa'||m==='caixaDiaUtil')return fmtBRL(v);
  if(m==='conversao'||m==='cashcollect'||m==='metaPct')return fmtPct(v);
  if(m==='score')return v+' pts';
  return v;
}
function metricLabel(m){var map={score:'Score',vendas:'Vendas',rbv:'RBV',conversao:'Conversão',caixa:'Caixa',caixaDiaUtil:'Caixa/Dia Útil',cashcollect:'Cash Collect',agendasDia:'Agendas/Dia',metaPct:'% Meta Atingida'};return map[m]||m;}

function renderRanking(){
  var metric=document.getElementById('sortMetric').value;
  var topN=parseInt(document.getElementById('topCount').value);
  if(currentPeriod==='trimestre'&&!canSeeTrimestre()&&currentUser.role!=='head'){
    document.getElementById('rankingContainer').innerHTML='<div class="locked-section"><div class="locked-icon">🔒</div><div class="locked-title">Ranking do Trimestre ainda não divulgado</div><div class="locked-sub">O resultado será divulgado na reunião de premiação. Fique ligado!</div></div>';
    return;
  }
  var data=getPeriodData().filter(function(d){return d.vendas>0||d.rbv>0||d.reunioes>0||d.caixaDiaUtil>0;});
  var scores={};
  data.forEach(function(d){scores[d.closer]=calcScore(d,data);});
  data.sort(function(a,b){return getMV(b,metric,scores)-getMV(a,metric,scores);});
  var maxVal=getMV(data[0]||{},metric,scores)||1;
  var shown=topN===99?data:data.slice(0,topN);

  if(currentPeriod==='semana'){var v=document.getElementById('semanaFilter').value;pLabel=v.replace('||',' — ');}

  document.getElementById('rankingSub').textContent=pLabel+' · Ordenado por '+metricLabel(metric);
  document.getElementById('rankingContainer').innerHTML=buildRankingHTML(shown,metric,maxVal,scores);
  setTimeout(function(){document.querySelectorAll('.r-bar-fill,.r-score-bar-fill').forEach(function(el){el.style.width=el.dataset.w+'%';});},50);
}
function buildRankingHTML(data,metric,maxVal,scores){
  if(!data.length)return '<div class="no-data">Nenhum dado para os filtros selecionados.</div>';
  var html='';
  if(data.length>=2){
    var top3=data.slice(0,Math.min(3,data.length));
    html+='<div class="podium">';
    var order=top3.length>=3?[top3[1],top3[0],top3[2]]:[top3[1],top3[0]].filter(Boolean);
    var cls3=top3.length>=3?['p2','p1','p3']:['p2','p1'];
    var crowns=top3.length>=3?['🥈','👑','🥉']:['🥈','👑'];
    order.forEach(function(d,i){
      var cls=cls3[i];var name=d.closer||'';var v=fmtMV(metric,getMV(d,metric,scores));
      html+='<div class="pod-wrap" onclick="showCloserEvol(''+name+'')"><div class="pod-crown">'+crowns[i]+'</div><div class="pod-avatar '+cls+'">'+initials(name)+'</div><div class="pod-name">'+name+'</div><span class="squad-badge '+sqBadge(d.squad)+'">'+d.squad+'</span><div class="pod-base '+cls+'"><div class="pod-pos">'+(cls==='p1'?'1º':cls==='p2'?'2º':'3º')+'</div><div class="pod-score">'+v+'</div></div></div>';
    });
    html+='</div>';
  }
  var listData=data.length>=2?data.slice(3):data;
  if(listData.length>0||data.length<2){
    html+='<div class="rank-list">';
    var srcArr=data.length<2?data:listData;
    srcArr.forEach(function(d,i){
      var pos=(data.length<2?i:i+3)+1;
      var v=getMV(d,metric,scores);
      var pct=Math.round((v/maxVal)*100);
      var name=d.closer||'';
      var sc=scores[name]||{};
      var ccAlert=d.cashCollect>0&&d.cashCollect<90;
      var pc=pos===1?'t1':pos===2?'t2':pos===3?'t3':'';
      var metaPct=sc.pctMeta||0;
      html+='<div class="rank-item'+(ccAlert?' alert-cc':'')+'" onclick="showCloserEvol(''+name+'')"><div class="r-pos '+pc+'">'+pos+'º</div><div class="r-avatar" style="background:'+avatarBg(d.squad)+'">'+initials(name)+(ccAlert?'<div class="cc-alert">!</div>':'')+'</div><div class="r-info"><div class="r-name">'+name+'</div><div class="r-squad '+sqClass(d.squad)+'">'+d.squad+'</div></div><div class="r-score-wrap"><div class="r-score-label">Score</div><div class="r-score-bar-track"><div class="r-score-bar-fill" data-w="'+(sc.score||0)+'" style="width:0%;background:linear-gradient(90deg,var(--accent),#818cf8)"></div></div><div style="font-size:11px;color:'+((sc.score||0)>=70?'#34d399':(sc.score||0)>=45?'#f59e0b':'var(--muted)')+'">'+( sc.score||0)+' pts</div></div><div class="r-bar-wrap"><div class="r-bar-lbl"><span>'+metricLabel(metric)+'</span><span>'+fmtMV(metric,v)+'</span></div><div class="r-bar-track"><div class="r-bar-fill" data-w="'+pct+'" style="width:0%;background:'+(d.squad==='Elite'?'linear-gradient(90deg,#6366f1,#818cf8)':'linear-gradient(90deg,#10b981,#34d399)')+'"></div></div></div><div class="r-metrics"><div class="r-metric"><div class="r-mv">'+d.vendas+'</div><div class="r-ml">Vendas</div></div><div class="r-metric"><div class="r-mv">'+fmtBRL(d.caixaDiaUtil)+'</div><div class="r-ml">Cx/Dia</div></div><div class="r-metric"><div class="r-mv">'+(metaPct>0?metaPct.toFixed(1).replace('.',',')+' %':'--')+'</div><div class="r-ml">% Meta</div></div><div class="r-metric"><div class="r-mv" style="'+(ccAlert?'color:var(--danger)':'')+'">'+fmtPct(d.cashCollect)+'</div><div class="r-ml">CC</div></div></div></div>';
    });
    html+='</div>';
  }
  return html;
}

  mkChart('cMeta','bar',labels,[{data:useData.map(function(d){return getMetaPct(d);}),backgroundColor:useData.map(function(d){return getMetaPct(d)>=100?'#10b98188':'#ef444488';}),borderRadius:5}]);
}
var _esc={};
function destroyESC(){Object.values(_esc).forEach(function(c){try{c.destroy();}catch(e){}});_esc={};}
function renderEvolSquad(){
  destroyESC();

  var labels=evolSquadGranu==='semana'?periods.map(function(p){var s=p.split('||');return s[1]+' ('+s[0]+')';}):[...periods];
  var html='';
  squads.forEach(function(sq){
    var sc2=sqColor(sq);var cid='evs_'+sq.replace(/[^a-z]/gi,'');
    var sqPD=periods.map(function(p){var data;if(evolSquadGranu==='semana'){var s=p.split('||');data=useData.filter(function(d){return d.mes===s[0]&&d.semana===s[1]&&d.squad===sq&&(d.vendas>0||d.rbv>0||d.caixaDiaUtil>0);});}else data=useData.filter(function(d){return d.mes===p&&d.squad===sq&&(d.vendas>0||d.rbv>0||d.caixaDiaUtil>0);});var n=data.length||1;return{caixaDiaUtil:data.reduce(function(a,x){return a+(x.caixaDiaUtil||0);},0)/n,vendas:data.reduce(function(a,x){return a+(x.vendas||0);},0),rbv:data.reduce(function(a,x){return a+(x.rbv||0);},0),conversao:data.reduce(function(a,x){return a+(x.conversao||0);},0)/n,cashCollect:data.reduce(function(a,x){return a+(x.cashCollect||0);},0)/n,agendasDia:data.reduce(function(a,x){return a+(x.agendasDia||0);},0)/n};});
    html+='<div class="squad-section"><div class="squad-title" style="color:'+sc2+'">Evolucao Squad '+sq+'</div><div class="charts-grid"><div class="chart-card chart-full"><div class="chart-title">Caixa/Dia Util Medio</div><canvas id="'+cid+'_cdu"></canvas></div><div class="chart-card"><div class="chart-title">Total Vendas</div><canvas id="'+cid+'_v"></canvas></div><div class="chart-card"><div class="chart-title">Total RBV</div><canvas id="'+cid+'_rbv"></canvas></div><div class="chart-card"><div class="chart-title">Conversao % Media</div><canvas id="'+cid+'_conv"></canvas></div><div class="chart-card"><div class="chart-title">Cash Collect % Medio</div><canvas id="'+cid+'_cc"></canvas></div><div class="chart-card"><div class="chart-title">Agendas/Dia Medio</div><canvas id="'+cid+'_ag"></canvas></div></div><div class="divider"></div></div>';
    (function(sq,cid,sqPD,sc2){setTimeout(function(){function mkES(id,type,datasets){var ctx=document.getElementById(id);if(!ctx)return;_esc[id]=new Chart(ctx,{type:type,data:{labels:labels,datasets:datasets},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#1f2937'},ticks:{color:'#64748b',font:{size:10}}},y:{grid:{color:'#1f2937'},ticks:{color:'#64748b',font:{size:10}}}}}});}mkES(cid+'_cdu','line',[{data:sqPD.map(function(d){return d.caixaDiaUtil;}),borderColor:sc2,backgroundColor:sc2+'22',tension:0.4,fill:true,borderWidth:2,pointBackgroundColor:sc2}]);mkES(cid+'_v','bar',[{data:sqPD.map(function(d){return d.vendas;}),backgroundColor:sc2+'cc',borderRadius:5}]);mkES(cid+'_rbv','bar',[{data:sqPD.map(function(d){return d.rbv;}),backgroundColor:sc2+'99',borderRadius:5}]);mkES(cid+'_conv','line',[{data:sqPD.map(function(d){return d.conversao;}),borderColor:'#f59e0b',backgroundColor:'#f59e0b22',tension:0.4,fill:true,borderWidth:2,pointBackgroundColor:'#f59e0b'}]);mkES(cid+'_cc','line',[{data:sqPD.map(function(d){return d.cashCollect;}),borderColor:'#f472b6',backgroundColor:'#f472b622',tension:0.4,fill:true,borderWidth:2,pointBackgroundColor:'#f472b6'}]);mkES(cid+'_ag','line',[{data:sqPD.map(function(d){return d.agendasDia;}),borderColor:'#38bdf8',backgroundColor:'#38bdf822',tension:0.4,fill:true,borderWidth:2,pointBackgroundColor:'#38bdf8'}]);},200);})(sq,cid,sqPD,sc2);
  });

function setSquadPeriod(p,btn){squadPeriod=p;document.querySelectorAll('#squadPeriodFilter .fbtn').forEach(function(b){b.classList.remove('active');});btn.classList.add('active');document.getElementById('squadSemanaWrap').style.display=p==='semana'?'flex':'none';document.getElementById('squadMesWrap').style.display=p==='mes'?'flex':'none';document.getElementById('squadTriWrap').style.display=p==='trimestre'?'flex':'none';renderSquad();}
var _sc={};
function destroySC(){Object.values(_sc).forEach(function(c){try{c.destroy();}catch(e){}});_sc={};}
function renderSquad(){
  destroySC();
  var data;
  if(squadPeriod==='semana'){var v=document.getElementById('squadSemanaFilter').value;var p=v.split('||');data=DATA_SEMANA.filter(function(d){return d.mes===p[0]&&d.semana===p[1];});}else if(squadPeriod==='mes')data=DATA_MES.filter(function(d){return d.mes===document.getElementById('squadMesFilter').value;});else data=DATA_TRIMESTRE.filter(function(d){return d.trimestre===document.getElementById('squadTriFilter').value;});
  var squads=currentUser.role==='supervisor'?[currentUser.squad]:['Elite','Furacão'];
  var html='';
  squads.forEach(function(sq){
    var sqD=data.filter(function(d){return d.squad===sq&&(d.vendas>0||d.rbv>0||d.reunioes>0||d.caixaDiaUtil>0);});
    if(!sqD.length)return;
    var mesAtual=sqD[0]&&sqD[0].mes||'';var metaSup=METAS[mesAtual]&&METAS[mesAtual].supervisores&&METAS[mesAtual].supervisores[sq]||0;
    var totRBV=sqD.reduce(function(a,d){return a+(d.rbv||0);},0);var totCaixa=sqD.reduce(function(a,d){return a+(d.caixa||0);},0);var totV=sqD.reduce(function(a,d){return a+(d.vendas||0);},0);var avgConv=sqD.reduce(function(a,d){return a+(d.conversao||0);},0)/sqD.length;var avgCDU=sqD.reduce(function(a,d){return a+(d.caixaDiaUtil||0);},0)/sqD.length;var metaTotal=sqD.reduce(function(a,d){return a+(METAS[d.mes||'']&&METAS[d.mes||''].closers[d.closer]||0);},0)+metaSup;var pctMetaSq=metaTotal>0?Math.round((totRBV/metaTotal)*100):0;
    var sc2=sqColor(sq);var cid='sq_'+sq.replace(/[^a-z]/gi,'');
    var sqScores={};sqD.forEach(function(d){sqScores[d.closer]=calcScore(d,sqD);});
    var sorted=[...sqD].sort(function(a,b){return(sqScores[b.closer]&&sqScores[b.closer].score||0)-(sqScores[a.closer]&&sqScores[a.closer].score||0);});
    var maxCDU=Math.max.apply(null,sorted.map(function(x){return x.caixaDiaUtil||0;}))||1;
    html+='<div class="squad-section"><div class="squad-title" style="color:'+sc2+'">Squad '+sq+' <span class="squad-badge '+sqBadge(sq)+'">'+sqD.length+' closers</span>'+(pctMetaSq>0?' <span class="meta-badge '+(pctMetaSq>=100?'meta-ok':'meta-nok')+'">'+pctMetaSq+'% da meta</span>':'')+'</div><div class="stats-row"><div class="stat-card hl"><div class="stat-val">'+fmtBRL(avgCDU)+'</div><div class="stat-lbl">Caixa/Dia Medio</div></div><div class="stat-card"><div class="stat-val" style="color:'+sc2+'">'+fmtBRL(totRBV)+'</div><div class="stat-lbl">Total RBV</div></div>'+(metaTotal>0?'<div class="stat-card"><div class="stat-val" style="color:'+(pctMetaSq>=100?'var(--success)':'var(--danger)')+'">'+pctMetaSq+'%</div><div class="stat-lbl">% Meta ('+fmtBRL(metaTotal)+')</div><div class="meta-progress-track"><div class="meta-progress-fill" style="width:'+Math.min(pctMetaSq,100)+'%;background:'+(pctMetaSq>=100?'var(--success)':'var(--danger)')+'"></div></div></div>':'')+'<div class="stat-card"><div class="stat-val" style="color:var(--gold)">'+totV+'</div><div class="stat-lbl">Total Vendas</div></div><div class="stat-card"><div class="stat-val" style="color:#38bdf8">'+fmtBRL(totCaixa)+'</div><div class="stat-lbl">Total Caixa</div></div><div class="stat-card"><div class="stat-val" style="color:#f59e0b">'+fmtPct(avgConv)+'</div><div class="stat-lbl">Conversao Media</div></div></div><div class="charts-grid"><div class="chart-card"><div class="chart-title">Score por Closer</div><canvas id="'+cid+'_sc"></canvas></div><div class="chart-card"><div class="chart-title">Caixa/Dia por Closer</div><canvas id="'+cid+'_cdu"></canvas></div></div><div class="rank-list" style="margin-top:14px">'+sorted.map(function(d,i){var name=d.closer||'';var s=sqScores[name]||{};var maxS=sqScores[sorted[0].closer]&&sqScores[sorted[0].closer].score||1;var pct=Math.round((s.score||0)/maxS*100);var cc=d.cashCollect>0&&d.cashCollect<90;return '<div class="rank-item'+(cc?' alert-cc':'')+'" onclick="showCloserEvol(''+name+'')"><div class="r-pos '+(i===0?'t1':i===1?'t2':i===2?'t3':'')+'">'+( i+1)+'</div><div class="r-avatar" style="background:'+avatarBg(d.squad)+'">'+initials(name)+(cc?'<div class="cc-alert">!</div>':'')+'</div><div class="r-info"><div class="r-name">'+name+'</div><div class="r-squad '+sqClass(d.squad)+'">'+d.squad+'</div></div><div class="r-score-wrap"><div class="r-score-label">Score</div><div class="r-score-bar-track"><div class="r-score-bar-fill" data-w="'+pct+'" style="width:0%;background:linear-gradient(90deg,var(--accent),'+sc2+')"></div></div><div style="font-size:11px">'+(s.score||0)+' pts</div></div><div class="r-bar-wrap"><div class="r-bar-lbl"><span>Caixa/Dia</span><span>'+fmtBRL(d.caixaDiaUtil)+'</span></div><div class="r-bar-track"><div class="r-bar-fill" data-w="'+Math.round((d.caixaDiaUtil/maxCDU)*100)+'" style="width:0%;background:'+(d.squad==='Elite'?'linear-gradient(90deg,#6366f1,#818cf8)':'linear-gradient(90deg,#10b981,#34d399)')+'"></div></div></div><div class="r-metrics"><div class="r-metric"><div class="r-mv">'+d.vendas+'</div><div class="r-ml">Vendas</div></div><div class="r-metric"><div class="r-mv">'+fmtBRL(d.rbv)+'</div><div class="r-ml">RBV</div></div><div class="r-metric"><div class="r-mv" style="'+(cc?'color:var(--danger)':'')+'">'+fmtPct(d.cashCollect)+'</div><div class="r-ml">CC</div></div></div></div>';}).join('')+'</div><div class="divider"></div></div>';
    (function(cid,sorted,sqScores,sc2){setTimeout(function(){function mkSq(id,type,ds){var ctx=document.getElementById(id);if(!ctx)return;_sc[id]=new Chart(ctx,{type:type,data:{labels:sorted.map(function(d){return d.closer||'';}),datasets:ds},options:{responsive:true,plugins:{legend:{display:false}},scales:{x:{grid:{color:'#1f2937'},ticks:{color:'#64748b',font:{size:10}}},y:{grid:{color:'#1f2937'},ticks:{color:'#64748b',font:{size:10}}}}}});}mkSq(cid+'_sc','bar',[{data:sorted.map(function(d){return sqScores[d.closer]&&sqScores[d.closer].score||0;}),backgroundColor:sc2+'cc',borderRadius:5}]);mkSq(cid+'_cdu','bar',[{data:sorted.map(function(d){return d.caixaDiaUtil;}),backgroundColor:sc2+'88',borderRadius:5}]);document.querySelectorAll('.r-bar-fill,.r-score-bar-fill').forEach(function(el){el.style.width=el.dataset.w+'%';});},120);})(cid,sorted,sqScores,sc2);
  });
  document.getElementById('squadContainer').innerHTML=html||'<div class="no-data">Nenhum dado disponivel.</div>';
}
