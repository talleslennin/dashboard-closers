*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e1a;--surface:#111827;--s2:#1f2937;--s3:#27364d;--gold:#f59e0b;--silver:#94a3b8;--bronze:#cd7c2f;--elite-c:#818cf8;--fur-c:#34d399;--text:#e2e8f0;--text2:#94a3b8;--green:#10b981;--red:#ef4444;--orange:#f59e0b;--blue:#3b82f6}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:radial-gradient(ellipse at center,#1a1f35 0%,#0a0e1a 70%)}
.login-card{background:var(--surface);border:1px solid #2d3748;border-radius:20px;padding:48px 40px;width:420px;text-align:center;box-shadow:0 25px 50px rgba(0,0,0,0.5)}
.login-logo{font-size:56px;margin-bottom:12px}
.login-title{font-size:26px;font-weight:800;margin-bottom:6px;background:linear-gradient(135deg,#f59e0b,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.login-sub{color:var(--text2);font-size:14px;margin-bottom:32px}
.login-form{display:flex;flex-direction:column;gap:16px}
.login-input{background:var(--s2);border:1px solid #374151;border-radius:10px;padding:14px 16px;color:var(--text);font-size:15px;outline:none;transition:border-color .2s}
.login-input:focus{border-color:var(--blue)}
.login-btn{background:linear-gradient(135deg,#3b82f6,#8b5cf6);border:none;border-radius:10px;padding:14px;color:#fff;font-size:16px;font-weight:700;cursor:pointer;transition:opacity .2s}
.login-btn:hover{opacity:.9}
.login-err{color:var(--red);font-size:13px;margin-top:8px;display:none}
.app{display:none;flex-direction:column;min-height:100vh}
.header{background:var(--surface);border-bottom:1px solid var(--s3);padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.header-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:16px}
.header-logo{width:32px;height:32px;background:linear-gradient(135deg,#f59e0b,#3b82f6);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}
.header-right{display:flex;align-items:center;gap:16px}
.lock-btn{background:var(--s3);border:1px solid #374151;border-radius:8px;padding:6px 14px;color:var(--text2);font-size:13px;cursor:pointer;display:flex;align-items:center;gap:6px}
.lock-btn.unlocked{border-color:var(--green);color:var(--green)}
.user-badge{display:flex;align-items:center;gap:8px}
.user-avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#8b5cf6);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px}
.user-info{line-height:1.2}
.user-name{font-size:13px;font-weight:600}
.user-role{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.logout-btn{background:none;border:1px solid #374151;border-radius:6px;padding:5px 10px;color:var(--text2);font-size:12px;cursor:pointer}
.nav-tabs{background:var(--surface);border-bottom:1px solid var(--s3);padding:0 24px;display:flex;gap:0}
.nav-tab{padding:14px 20px;font-size:14px;font-weight:500;color:var(--text2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;display:flex;align-items:center;gap:6px}
.nav-tab.active{color:var(--text);border-bottom-color:var(--blue)}
.content{flex:1;padding:24px;max-width:1400px;margin:0 auto;width:100%}
.filters{background:var(--surface);border:1px solid var(--s3);border-radius:12px;padding:16px 20px;margin-bottom:20px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px}
.filter-select{background:var(--s2);border:1px solid #374151;border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;cursor:pointer;min-width:130px}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:16px;margin-bottom:32px;padding:24px}
.podium-item{display:flex;flex-direction:column;align-items:center;gap:8px}
.podium-avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:22px;position:relative}
.podium-avatar.p1{width:88px;height:88px;border:3px solid var(--gold)}
.podium-avatar.p2{width:72px;height:72px;border:2px solid var(--silver)}
.podium-avatar.p3{width:64px;height:64px;border:2px solid var(--bronze)}
.podium-medal{position:absolute;top:-14px;font-size:20px}
.podium-squad-badge{position:absolute;bottom:-6px;right:-6px;width:18px;height:18px;border-radius:50%;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:700;border:2px solid var(--bg)}
.podium-name{font-size:14px;font-weight:700}
.podium-val{font-size:15px;font-weight:700;color:var(--green)}
.podium-squad{font-size:11px;color:var(--text2)}
.podium-pos{font-size:13px;font-weight:800;padding:4px 12px;border-radius:6px}
.podium-pos.p1{background:var(--gold);color:#000}
.podium-pos.p2{background:var(--s3);color:var(--silver)}
.podium-pos.p3{background:#2a1f0a;color:var(--bronze)}
.ranking-list{display:flex;flex-direction:column;gap:8px}
.rank-item{background:var(--surface);border:1px solid var(--s3);border-radius:12px;padding:14px 20px;display:flex;align-items:center;gap:16px;transition:background .2s;cursor:pointer}
.rank-item:hover{background:var(--s2)}
.rank-pos{font-size:18px;font-weight:800;color:var(--text2);min-width:32px;text-align:center}
.rank-avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;position:relative;flex-shrink:0}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.rank-badges{display:flex;align-items:center;gap:6px;margin-top:4px}
.rank-meta-bar{flex:1;height:4px;background:var(--s3);border-radius:2px;overflow:hidden;margin-top:6px}
.rank-meta-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--elite-c));border-radius:2px}
.squad-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.squad-badge.elite{background:rgba(129,140,248,.15);color:var(--elite-c)}
.squad-badge.furacao{background:rgba(52,211,153,.15);color:var(--fur-c)}
.cc-alert{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);border-radius:6px;padding:2px 8px;font-size:11px;color:var(--red);display:flex;align-items:center;gap:4px}
.rank-stats{display:flex;gap:24px;text-align:right}
.rank-stat{display:flex;flex-direction:column}
.rank-stat-val{font-size:14px;font-weight:700}
.rank-stat-lbl{font-size:10px;color:var(--text2)}
.score-badge{background:linear-gradient(135deg,var(--blue),var(--elite-c));border-radius:8px;padding:4px 12px;font-size:16px;font-weight:800;color:#fff;min-width:48px;text-align:center}
.tab-content{display:none}
.tab-content.active{display:block}
.chart-container{background:var(--surface);border:1px solid var(--s3);border-radius:12px;padding:20px;margin-bottom:20px}
.chart-title{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:16px;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.evol-filters{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.evol-select{background:var(--s2);border:1px solid #374151;border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;cursor:pointer}
.closer-profile{display:flex;align-items:center;gap:16px;margin-bottom:24px;background:var(--surface);border:1px solid var(--s3);border-radius:12px;padding:20px}
.closer-avatar-lg{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:24px}
.closer-profile-info{flex:1}
.closer-profile-name{font-size:20px;font-weight:700}
.premios-section{margin-bottom:32px}
.premios-title{font-size:18px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.trimestre-lock{background:var(--surface);border:1px solid var(--s3);border-radius:12px;padding:40px;text-align:center}

.squad-stat-val{font-size:18px;font-weight:700}
.squad-stat-lbl{font-size:11px;color:var(--text2);margin-top:2px}

.closer-item-name{flex:1;font-size:13px;font-weight:500}
.closer-item-val{font-size:13px;font-weight:700}

</head>

</div>

// ==================== UTILS ====================
function fmtBRL(v){ return "R$ " + v.toFixed(2).replace(".",",").replace(/B(?=(d{3})+(?!d))/g,"."); }
function fmtPct(v){ return v.toFixed(1) + "%"; }
function fmtNum(v){ return v.toFixed(1); }
function getInitials(name){ return name.split(" ").map(function(w){return w[0];}).join("").substring(0,2).toUpperCase(); }
function getSquadColor(squad){ return squad === "Elite" ? "var(--elite-c)" : "var(--fur-c)"; }
function getSquadClass(squad){ return squad === "Elite" ? "elite" : "furacao"; }
function getAvatarBg(name){
  var colors = ["#3b82f6","#8b5cf6","#ec4899","#f59e0b","#10b981","#06b6d4","#ef4444","#84cc16"];
  var h = 0; for(var i=0;i<name.length;i++) h = (h*31 + name.charCodeAt(i)) & 0xFFFFFF;
  return colors[Math.abs(h) % colors.length];
}
function getMetaPct(d, period, mes){
  if(period === "trimestre") return 0;
  var mKey = (period === "semana") ? "abril" : mes;
  var mObj = METAS[mKey];
  if(!mObj) return 0;
  var nm = d.name === "Flávia" ? "Flavia" : d.name;
  var meta = mObj[nm];
  if(!meta || meta === 0) return 0;
  if(period === "semana"){
    var diasTot = 20;
    var metaSemana = meta * (d.diasUteis / diasTot);
    return d.rbv / metaSemana * 100;
  }
  return d.rbv / meta * 100;
}
function calcScore(d, period, mes){
  var agDiaMax = 12; var cxDiaMax = 10000;
  var agDiaScore = Math.min(d.agDia / agDiaMax * 100, 100);
  var metaPct;
  if(period === "trimestre"){
    var mKey = "marco";
    var mObj = METAS[mKey];
    var nm2 = d.name === "Flávia" ? "Flavia" : d.name;
    metaPct = mObj && mObj[nm2] ? Math.min(d.rbv / mObj[nm2] * 100, 200) : 0;
  } else {
    metaPct = Math.min(getMetaPct(d, period, mes), 200);
  }
  var metaScore = metaPct / 2;
  var cxDiaScore = Math.min(d.cxDia / cxDiaMax * 100, 100);
  var convScore = Math.min(d.conv / 40 * 100, 100);
  var ccScore = Math.min(d.cc, 100);
  return Math.round(agDiaScore * 0.25 + metaScore * 0.25 + cxDiaScore * 0.20 + convScore * 0.20 + ccScore * 0.10);
}

// ==================== AUTH ====================
function doLogin(){
  var u = document.getElementById("loginUser").value.trim().toLowerCase();
  var p = document.getElementById("loginPass").value;
  var found = null;
  for(var i=0;i<USERS.length;i++){ if(USERS[i].code === u && USERS[i].pass === p){ found = USERS[i]; break; } }
  if(!found){ document.getElementById("loginErr").style.display = "block"; return; }
  state.user = found;
  document.getElementById("loginScreen").style.display = "none";
  document.getElementById("app").style.display = "flex";
  document.getElementById("userName").textContent = found.name;
  document.getElementById("userRole").textContent = found.role === "head" ? "HEAD COMERCIAL" : found.role === "supervisor" ? "SUPERVISOR" : "CLOSER";
  var av = document.getElementById("userAvatar");
  av.textContent = getInitials(found.name);
  av.style.background = "linear-gradient(135deg," + getAvatarBg(found.name) + ",#8b5cf6)";
  if(found.role === "head"){ document.getElementById("lockBtn").style.display = "flex"; }
  if(found.role === "closer"){
    document.querySelectorAll(".nav-tab").forEach(function(t){ if(t.getAttribute("data-tab") === "squads" || t.getAttribute("data-tab") === "premios") t.style.display = "none"; });
  }
  populateEvolCloserSel();
  renderRanking();
}

document.addEventListener("DOMContentLoaded", function(){

  });
  document.getElementById("sortSel").addEventListener("change", function(){

  });
  document.getElementById("squadSel").addEventListener("change", function(){

  });

  document.querySelectorAll(".nav-tab").forEach(function(tab){
    tab.addEventListener("click", function(){
      var t = this.getAttribute("data-tab");
      document.querySelectorAll(".nav-tab").forEach(function(x){ x.classList.remove("active"); });
      document.querySelectorAll(".tab-content").forEach(function(x){ x.classList.remove("active"); });
      this.classList.add("active");
      document.getElementById("tab-"+t).classList.add("active");
      if(t === "squads") renderSquads();
      if(t === "premios") renderPremios();
      if(t === "evolucao") renderEvolucao();
    });
  });
  document.addEventListener("click", function(e){
    var el = e.target.closest("[data-closer]");
    if(el){
      var closerName = el.getAttribute("data-closer");
      showCloserEvol(closerName);
    }
  });
});

function populateEvolCloserSel(){
  var sel = document.getElementById("evolCloserSel");
  sel.innerHTML = "";
  var names = DATA_TRIMESTRE.map(function(d){ return d.name; });
  if(state.user && state.user.role === "closer"){
    names = names.filter(function(n){ return n === state.user.name; });
  } else if(state.user && state.user.role === "supervisor"){
    names = names.filter(function(n){
      var u = USERS.find(function(u){ return u.name === n; });
      return u && u.squad === state.user.squad;
    });
  }
  names.forEach(function(n){
    var opt = document.createElement("option");
    opt.value = n; opt.textContent = n;
    sel.appendChild(opt);
  });
  state.evolCloser = names[0] || null;
}

function showCloserEvol(name){
  state.evolCloser = name;
  document.querySelectorAll(".nav-tab").forEach(function(x){ x.classList.remove("active"); });
  document.querySelectorAll(".tab-content").forEach(function(x){ x.classList.remove("active"); });
  document.querySelector(".nav-tab[data-tab=evolucao]").classList.add("active");
  document.getElementById("tab-evolucao").classList.add("active");
  var sel = document.getElementById("evolCloserSel");
  for(var i=0;i<sel.options.length;i++){ if(sel.options[i].value === name){ sel.selectedIndex = i; break; } }
  renderEvolucao();
}

// ==================== RANKING ====================
function getData(){
  if(state.period === "semana") return DATA_SEMANA;
  if(state.period === "mes") return DATA_MES[state.mes] || DATA_MES.marco;
  return DATA_TRIMESTRE;
}

function getSortVal(d){
  var s = state.sort;
  if(s === "score") return calcScore(d, state.period, state.mes);
  if(s === "vendas") return d.vendas;
  if(s === "rbv") return d.rbv;
  if(s === "caixa") return d.caixa;
  if(s === "cxDia") return d.cxDia;
  if(s === "conv") return d.conv;
  if(s === "cc") return d.cc;
  if(s === "agDia") return d.agDia;
  if(s === "metaPct") return getMetaPct(d, state.period, state.mes);
  return 0;
}

function fmtVal(d){
  var s = state.sort;
  if(s === "score") return calcScore(d, state.period, state.mes) + " pts";
  if(s === "vendas") return d.vendas + " vendas";
  if(s === "rbv") return fmtBRL(d.rbv);
  if(s === "caixa") return fmtBRL(d.caixa);
  if(s === "cxDia") return fmtBRL(d.cxDia) + "/dia";
  if(s === "conv") return fmtPct(d.conv);
  if(s === "cc") return fmtPct(d.cc);
  if(s === "agDia") return fmtNum(d.agDia) + "/dia";
  if(s === "metaPct") return fmtPct(getMetaPct(d, state.period, state.mes));
  return "";
}

function renderRanking(){
  var data = getData();
  if(state.user && state.user.role === "closer"){
    data = data.filter(function(d){ return d.name === state.user.name; });
  } else if(state.user && state.user.role === "supervisor"){
    data = data.filter(function(d){ return d.squad === state.user.squad; });
  } else if(state.squad !== "todos"){
    var sqMap = {elite:"Elite",furacao:"Furação"};
    data = data.filter(function(d){ return d.squad === sqMap[state.squad]; });
  }
  if(state.period === "trimestre" && !state.trimestreUnlocked){
    data = [];
  }
  data = data.slice().sort(function(a,b){ return getSortVal(b) - getSortVal(a); });
  var topN = state.top;
  var podiumData = data.slice(0, Math.min(3, data.length));
  var listData = data.slice(3, topN);
  var html = "";
  if(state.period === "trimestre" && !state.trimestreUnlocked){
    html = "<div style=\"text-align:center;padding:60px;color:var(--text2)\"><div style=\"font-size:48px;margin-bottom:16px\">🔒</div><div style=\"font-size:18px;margin-bottom:8px\">Ranking do Trimestre Bloqueado</div><div style=\"font-size:14px\">Apenas o Head pode desbloquear</div></div>";
    document.getElementById("rankingContainer").innerHTML = html;
    return;
  }
  if(podiumData.length > 0){
    html += "<div class=\"podium\">";
    var order = podiumData.length === 1 ? [0] : podiumData.length === 2 ? [1,0] : [1,0,2];
    order.forEach(function(idx){
      if(idx >= podiumData.length) return;
      var d = podiumData[idx];
      var pos = idx + 1;
      var pClass = "p" + pos;
      var medal = pos===1 ? "🥇" : pos===2 ? "🥈" : "🥉";
      var sqBg = d.squad === "Elite" ? "var(--elite-c)" : "var(--fur-c)";
      var sqLetter = d.squad === "Elite" ? "E" : "F";
      html += "<div class=\"podium-item\">";
      html += "<div class=\"podium-medal\">" + medal + "</div>";
      html += "<div class=\"podium-avatar " + pClass + "\" style=\"background:" + getAvatarBg(d.name) + "\">";
      html += getInitials(d.name);
      html += "<span class=\"podium-squad-badge\" style=\"background:" + sqBg + ";color:#000\">" + sqLetter + "</span>";
      html += "</div>";
      html += "<div class=\"podium-name\">" + d.name + "</div>";
      html += "<div class=\"podium-val\">" + fmtVal(d) + "</div>";
      html += "<div class=\"podium-squad\">" + d.squad + "</div>";
      html += "<div class=\"podium-pos " + pClass + "\">" + pos + "º</div>";
      html += "</div>";
    });
    html += "</div>";
  }
  html += "<div class=\"ranking-list\">";
  listData.forEach(function(d, i){
    var pos = i + 4;
    var score = calcScore(d, state.period, state.mes);
    var metaPct = getMetaPct(d, state.period, state.mes);
    var ccAlert = d.cc < 90 ? "<span class=\"cc-alert\">⚠ CC " + fmtPct(d.cc) + "</span>" : "";
    var metaStr = state.period !== "trimestre" ? "Meta: " + fmtPct(metaPct) : "";
    html += "<div class=\"rank-item\" data-closer=\"" + d.name + "\">";
    html += "<div class=\"rank-pos\">" + pos + "</div>";
    html += "<div class=\"rank-avatar\" style=\"background:" + getAvatarBg(d.name) + "\">" + getInitials(d.name) + "</div>";
    html += "<div class=\"rank-info\">";
    html += "<div class=\"rank-name\">" + d.name + "</div>";
    html += "<div class=\"rank-badges\"><span class=\"squad-badge " + getSquadClass(d.squad) + "\">" + d.squad + "</span>" + ccAlert + (metaStr ? "<span style=\"font-size:11px;color:var(--text2)\">" + metaStr + "</span>" : "") + "</div>";
    html += "<div class=\"rank-meta-bar\"><div class=\"rank-meta-fill\" style=\"width:" + Math.min(metaPct,100) + "%\"></div></div>";
    html += "</div>";
    html += "<div class=\"rank-stats\">";
    html += "<div class=\"rank-stat\"><div class=\"rank-stat-val\">" + d.vendas + "</div><div class=\"rank-stat-lbl\">Vendas</div></div>";
    html += "<div class=\"rank-stat\"><div class=\"rank-stat-val\">" + fmtBRL(d.cxDia) + "</div><div class=\"rank-stat-lbl\">Cx/Dia</div></div>";
    html += "<div class=\"rank-stat\"><div class=\"rank-stat-val\">" + fmtPct(d.conv) + "</div><div class=\"rank-stat-lbl\">Conv.</div></div>";
    html += "<div class=\"rank-stat\"><div class=\"rank-stat-val\">" + fmtPct(metaPct) + "</div><div class=\"rank-stat-lbl\">% Meta</div></div>";
    html += "<div class=\"score-badge\">" + score + "</div>";
    html += "</div></div>";
  });
  html += "</div>";
  document.getElementById("rankingContainer").innerHTML = html;
}

    eligible.forEach(function(d, i){
      html += "<div class=\"rank-item\" data-closer=\"" + d.name + "\">";
      html += "<div class=\"rank-pos\">" + (i+1) + "</div>";
      html += "<div class=\"rank-avatar\" style=\"background:" + getAvatarBg(d.name) + "\">" + getInitials(d.name) + "</div>";
      html += "<div class=\"rank-info\"><div class=\"rank-name\">" + d.name + "</div>";
      html += "<div class=\"rank-badges\"><span class=\"squad-badge " + getSquadClass(d.squad) + "\">" + d.squad + "</span></div></div>";
      html += "<div class=\"rank-stats\">";
      html += "<div class=\"rank-stat\"><div class=\"rank-stat-val\">" + fmtBRL(d.cxDia) + "</div><div class=\"rank-stat-lbl\">Cx/Dia</div></div>";
      html += "<div class=\"rank-stat\"><div class=\"rank-stat-val\">" + d.vendas + "</div><div class=\"rank-stat-lbl\">Vendas</div></div>";
      html += "<div class=\"rank-stat\"><div class=\"rank-stat-val\">" + fmtBRL(d.rbv) + "</div><div class=\"rank-stat-lbl\">RBV</div></div>";
      html += "</div></div>";
    });
    html += "</div>";
  }
  html += "</div>";
  document.getElementById("premiosContainer").innerHTML = html;
}

// ==================== EVOLUCAO ====================
function renderEvolucao(){
  if(!state.evolCloser) return;
  var name = state.evolCloser;
  var closer = null;
  for(var i=0;i<DATA_TRIMESTRE.length;i++){ if(DATA_TRIMESTRE[i].name === name){ closer = DATA_TRIMESTRE[i]; break; } }
  if(!closer) return;
  var marcoDat = null;
  for(var j=0;j<DATA_MES.marco.length;j++){ if(DATA_MES.marco[j].name === name){ marcoDat = DATA_MES.marco[j]; break; } }
  var abrilDat = null;
  for(var k=0;k<DATA_SEMANA.length;k++){ if(DATA_SEMANA[k].name === name){ abrilDat = DATA_SEMANA[k]; break; } }
  var sqColor = getSquadColor(closer.squad);
  var html = "";
  html += "<div class=\"closer-profile\">";
  html += "<div class=\"closer-avatar-lg\" style=\"background:" + getAvatarBg(name) + "\">" + getInitials(name) + "</div>";
  html += "<div class=\"closer-profile-info\"><div class=\"closer-profile-name\">" + name + "</div>";
  html += "<div class=\"rank-badges\" style=\"margin-top:6px\"><span class=\"squad-badge " + getSquadClass(closer.squad) + "\">" + closer.squad + "</span></div></div>";
  html += "</div>";
  var labels, cxDiaData, vendasData, convData, ccData, agDiaData, rbvData;
  if(state.evolPeriod === "mensal"){
    labels = ["Março","Abril S1"];
    cxDiaData = [marcoDat ? marcoDat.cxDia : 0, abrilDat ? abrilDat.cxDia : 0];
    vendasData = [marcoDat ? marcoDat.vendas : 0, abrilDat ? abrilDat.vendas : 0];
    convData = [marcoDat ? marcoDat.conv : 0, abrilDat ? abrilDat.conv : 0];
    ccData = [marcoDat ? marcoDat.cc : 0, abrilDat ? abrilDat.cc : 0];
    agDiaData = [marcoDat ? marcoDat.agDia : 0, abrilDat ? abrilDat.agDia : 0];
    rbvData = [marcoDat ? marcoDat.rbv : 0, abrilDat ? abrilDat.rbv : 0];
  } else {
    labels = ["Jan-Mar (Trim.)"];
    cxDiaData = [closer.cxDia];
    vendasData = [closer.vendas];
    convData = [closer.conv];
    ccData = [closer.cc];
    agDiaData = [closer.agDia];
    rbvData = [closer.rbv];
  }
  var charts = [
    {id:"chartCxDia",title:"Caixa/Dia Útil",data:cxDiaData,color:"#3b82f6",fmt:function(v){return fmtBRL(v);}},
    {id:"chartVendas",title:"Vendas",data:vendasData,color:"#10b981",fmt:function(v){return v;}},
    {id:"chartRBV",title:"RBV (R$)",data:rbvData,color:"#8b5cf6",fmt:function(v){return fmtBRL(v);}},
    {id:"chartConv",title:"Conversão %",data:convData,color:"#f59e0b",fmt:function(v){return fmtPct(v);}},
    {id:"chartCC",title:"Cash Collect %",data:ccData,color:"#ec4899",fmt:function(v){return fmtPct(v);}},
    {id:"chartAgDia",title:"Agendas/Dia",data:agDiaData,color:"#06b6d4",fmt:function(v){return fmtNum(v);}}
  ];
  html += "<div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px\">";
  charts.forEach(function(c){
    html += "<div class=\"chart-container\"><div class=\"chart-title\">📊 " + c.title + "</div><canvas id=\"" + c.id + "_" + name.replace(/s/g,"_") + "\"></canvas></div>";
  });
  html += "</div>";
  document.getElementById("evolContainer").innerHTML = html;
  charts.forEach(function(c){
    var canvasId = c.id + "_" + name.replace(/s/g,"_");
    var ctx = document.getElementById(canvasId);
    if(!ctx) return;
    if(state.charts[canvasId]) { try{ state.charts[canvasId].destroy(); }catch(e){} }
    state.charts[canvasId] = new Chart(ctx, {
      type: "bar",
      data: { labels: labels, datasets: [{ label: c.title, data: c.data, backgroundColor: c.color + "99", borderColor: c.color, borderWidth:2, borderRadius:6 }] },
      options: {
        responsive: true,
        plugins: { legend:{display:false}, tooltip:{ callbacks:{ label:function(ctx){ return c.fmt(ctx.raw); } } } },
        scales: {
          x: { ticks:{color:"#94a3b8"}, grid:{color:"#1f2937"} },
          y: { ticks:{color:"#94a3b8",callback:function(v){ return c.fmt(v); }}, grid:{color:"#1f2937"} }
        }
      }
    });
  });
}

// ==================== SQUADS ====================
function renderSquads(){
  var eliteClosers = DATA_TRIMESTRE.filter(function(d){ return d.squad === "Elite"; });
  var furacaoClosers = DATA_TRIMESTRE.filter(function(d){ return d.squad === "Furação"; });
  function squadAvg(arr, key){ return arr.reduce(function(s,d){ return s+d[key]; },0) / arr.length; }
  function squadSum(arr, key){ return arr.reduce(function(s,d){ return s+d[key]; },0); }
  var html = "";
  html += "<div class=\"squads-grid\">";
  [{label:"Elite",closers:eliteClosers,color:"var(--elite-c)"},{label:"Furação",closers:furacaoClosers,color:"var(--fur-c)"}].forEach(function(sq){
    var avg = function(key){ return squadAvg(sq.closers, key); };
    var sum = function(key){ return squadSum(sq.closers, key); };
    html += "<div class=\"squad-card\">";
    html += "<div class=\"squad-card-title\" style=\"color:" + sq.color + "\">⚡ Squad " + sq.label + "</div>";
    html += "<div class=\"squad-stat-grid\">";
    html += "<div class=\"squad-stat\"><div class=\"squad-stat-val\" style=\"color:" + sq.color + "\">" + fmtBRL(avg("cxDia")) + "</div><div class=\"squad-stat-lbl\">Cx/Dia Médio</div></div>";
    html += "<div class=\"squad-stat\"><div class=\"squad-stat-val\">" + sum("vendas") + "</div><div class=\"squad-stat-lbl\">Vendas Total</div></div>";
    html += "<div class=\"squad-stat\"><div class=\"squad-stat-val\">" + fmtPct(avg("conv")) + "</div><div class=\"squad-stat-lbl\">Conv. Média</div></div>";
    html += "<div class=\"squad-stat\"><div class=\"squad-stat-val\">" + fmtBRL(sum("rbv")) + "</div><div class=\"squad-stat-lbl\">RBV Total</div></div>";
    html += "<div class=\"squad-stat\"><div class=\"squad-stat-val\">" + fmtPct(avg("cc")) + "</div><div class=\"squad-stat-lbl\">CC Médio</div></div>";
    html += "<div class=\"squad-stat\"><div class=\"squad-stat-val\">" + fmtNum(avg("agDia")) + "</div><div class=\"squad-stat-lbl\">Ag/Dia Médio</div></div>";
    html += "</div>";
    html += "<div class=\"closer-list\">";
    var sorted = sq.closers.slice().sort(function(a,b){ return b.cxDia - a.cxDia; });
    sorted.forEach(function(d){
      html += "<div class=\"closer-item\" data-closer=\"" + d.name + "\">";
      html += "<div class=\"closer-item-avatar\" style=\"background:" + getAvatarBg(d.name) + "\">" + getInitials(d.name) + "</div>";
      html += "<div class=\"closer-item-name\">" + d.name + "</div>";
      html += "<div class=\"closer-item-val\">" + fmtBRL(d.cxDia) + "/dia</div>";
      html += "</div>";
    });
    html += "</div></div>";
  });
  html += "</div>";
  html += "<div class=\"squads-grid\">";
  [{label:"Elite",closers:eliteClosers,color:"var(--elite-c)"},{label:"Furação",closers:furacaoClosers,color:"var(--fur-c)"}].forEach(function(sq){
    html += "<div class=\"chart-container\">";
    html += "<div class=\"chart-title\" style=\"color:" + sq.color + "\">Evolução - Squad " + sq.label + " (Trim.)</div>";
    html += "<canvas id=\"squadChart" + sq.label.replace(/ç/g,"c") + "\"></canvas>";
    html += "</div>";
  });
  html += "</div>";
  document.getElementById("squadsContainer").innerHTML = html;
  setTimeout(function(){
    [{label:"Elite",closers:eliteClosers,color:"#818cf8"},{label:"Furação",closers:furacaoClosers,color:"#34d399"}].forEach(function(sq){
      var canvasId = "squadChart" + sq.label.replace(/ç/g,"c");
      var ctx = document.getElementById(canvasId);
      if(!ctx) return;
      if(state.charts[canvasId]) { try{ state.charts[canvasId].destroy(); }catch(e){} }
      var sorted = sq.closers.slice().sort(function(a,b){ return b.cxDia - a.cxDia; });
      var names2 = sorted.map(function(d){ return d.name; });
      var vals = sorted.map(function(d){ return d.cxDia; });
      state.charts[canvasId] = new Chart(ctx, {
        type: "bar",
        data: { labels: names2, datasets: [{ label: "Caixa/Dia (R$)", data: vals, backgroundColor: sq.color + "99", borderColor: sq.color, borderWidth:2, borderRadius:6 }] },
        options: {
          responsive: true,
          plugins: { legend:{display:false} },
          scales: {
            x: { ticks:{color:"#94a3b8"}, grid:{color:"#1f2937"} },
            y: { ticks:{color:"#94a3b8",callback:function(v){ return fmtBRL(v); }}, grid:{color:"#1f2937"} }
          }
        }
      });
    });
  }, 100);
}
</script>
